name: Daily Avito Data Refresh

on:
  schedule:
    # Runs every day at 01:00 UTC (around 2:00 AM in Morocco)
    - cron: '0 1 * * *'
  
  # Allows triggering the workflow manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Caches dependencies to speed up future runs
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipelines/requirements.txt
          
      - name: Run data pipeline
        working-directory: ./data-pipelines/avito_scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python pipeline.py
